# Template for monocular pinhole + OpenCV radial distortion (StellaVSLAM / OpenVSLAM style).
# Copy and fill fx, fy, cx, cy and distortion coefficients from your calibration report.
# See StellaVSLAM example YAMLs under: https://github.com/stella-cv/stella_vslam/tree/main/example

Camera:
  name: "your_webcam_pinhole"
  setup: "monocular"
  model: "perspective"

  # Intrinsic matrix (3x3). Replace with calibrated values.
  fx: 600.0
  fy: 600.0
  cx: 320.0
  cy: 240.0

  # OpenCV k1 k2 p1 p2 k3 (set unused coeffs to 0.0)
  k1: 0.0
  k2: 0.0
  p1: 0.0
  p2: 0.0
  k3: 0.0

  # Image size your calibration and video actually use
  cols: 640
  rows: 480

  fps: 30.0

# Optional rectangular mask (pixels) to crop black borders; adjust or remove.
mask_rect:
  - 0
  - 0
  - 640
  - 480
